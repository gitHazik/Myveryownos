<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYveryOWNos</title>
    <link rel="stylesheet" href="Style/index.css">
</head>
<body>
    <div id="desktop">
        <div id="topbar">
            <div class="top-left">MYveryOWNos</div>
            <div id="clock">10:52 PM</div>
        </div>

        <div id="desktop-icons">
            <div class="desktop-icon" id="icon-files"><span>📁 Files</span></div>
            <div class="desktop-icon" id="icon-trash"><span>🗑️ Trash</span></div>
        </div>

        <div id="windows"></div>

        <div id="dock">
            <div class="dock-icon" id="dock-files">📁</div>
            <div class="dock-icon" id="dock-browser">🌐</div>
            <div class="dock-icon" id="dock-terminal">🖥️</div>
            <div class="dock-icon" id="dock-settings">⚙️</div>
        </div>
    </div>

    <template id="window-template">
        <div class="window">
            <div class="titlebar">
                <div class="window-title">App</div>
                <div class="window-buttons">
                    <button class="min-btn">−</button>
                    <button class="close-btn">×</button>
                </div>
            </div>
            <div class="window-body"></div>
        </div>
    </template>

    <script src="Script/main.js"></script>
</body>
</html>
